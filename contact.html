<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport"
content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <a href="index.html">
        <div class="logo"></div>
    </a>

    <nav>
        <a href="index.html">Home</a>
        <a href="routes.html">Routes</a>
        <a href="booking.html">Booking</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<div class="contact-form">

    <h1>Get In Touch</h1>

    <br>

    <input type="text"
    id="name"
    placeholder="Enter your full name">

    <input type="email"
    id="email"
    placeholder="Enter email address">

    <textarea rows="6"
    id="message"
    placeholder="Type your message here"></textarea>

    <button class="btn"
    onclick="sendMessage()">
        Send Message
    </button>

    <br><br>

    <div id="successMessage"
    style="display:none;
    background:green;
    color:white;
    padding:15px;
    border-radius:10px;">

        Your ticket has been booked successfully.<br>
        Your ticket will be sent to your email.

    </div>

</div>

<footer>

    <div>
        <h3>CONTACT INFORMATION</h3>
        <p>+26773456780</p>
        <p>+26772825867</p>
        <p>info@buses.co.bw</p>
        <p>support@kaundabuses.co.bw</p>
    </div>

    <div>
        <h3>OPERATING HOURS</h3>
        <p>Mon-Fri: 07:00-18:00</p>
        <p>Sat: 07:00-14:00</p>
        <p>Sun: Closed</p>
    </div>

</footer>

<script>

function sendMessage(){

    document.getElementById(
    "successMessage").style.display = "block";

}

</script>

</body>
</html>
